<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F4F0"/>
      <stop offset="100%" stop-color="#E7E5E0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!--
    Swift in flight — smooth body, long tapered wings, compact form.
    Three layers create depth/flock/pane metaphor.
  -->

  <!-- Back layer -->
  <g transform="translate(540, 505) scale(2.4)">
    <path d="
      M 0,-28
      C -8,-25 -22,-16 -42,-4
      C -62,8 -90,18 -120,24
      C -138,28 -152,28 -158,26
      C -152,26 -144,24 -132,18
      C -108,6 -72,-8 -35,-10
      C -22,-10 -12,-6 -6,4
      L 0,18
      L 6,4
      C 12,-6 22,-10 35,-10
      C 72,-8 108,6 132,18
      C 144,24 152,26 158,26
      C 152,28 138,28 120,24
      C 90,18 62,8 42,-4
      C 22,-16 8,-25 0,-28
      Z
    " fill="#CDCBC5"/>
  </g>

  <!-- Middle layer -->
  <g transform="translate(526, 490) scale(2.4)">
    <path d="
      M 0,-28
      C -8,-25 -22,-16 -42,-4
      C -62,8 -90,18 -120,24
      C -138,28 -152,28 -158,26
      C -152,26 -144,24 -132,18
      C -108,6 -72,-8 -35,-10
      C -22,-10 -12,-6 -6,4
      L 0,18
      L 6,4
      C 12,-6 22,-10 35,-10
      C 72,-8 108,6 132,18
      C 144,24 152,26 158,26
      C 152,28 138,28 120,24
      C 90,18 62,8 42,-4
      C 22,-16 8,-25 0,-28
      Z
    " fill="#908F8A"/>
  </g>

  <!-- Front layer -->
  <g transform="translate(512, 475) scale(2.4)">
    <path d="
      M 0,-28
      C -8,-25 -22,-16 -42,-4
      C -62,8 -90,18 -120,24
      C -138,28 -152,28 -158,26
      C -152,26 -144,24 -132,18
      C -108,6 -72,-8 -35,-10
      C -22,-10 -12,-6 -6,4
      L 0,18
      L 6,4
      C 12,-6 22,-10 35,-10
      C 72,-8 108,6 132,18
      C 144,24 152,26 158,26
      C 152,28 138,28 120,24
      C 90,18 62,8 42,-4
      C 22,-16 8,-25 0,-28
