<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flock — you're in</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F0E8;
      --bg-alt: #EDE8DF;
      --bg-warm: #FFF8E8;
      --ink: #1A1917;
      --ink-soft: #6E6B65;
      --ink-faint: #A8A49E;
      --accent: #E2603C;
      --accent-dark: #C94E2E;
      --green: #5B9A6B;
      --blue: #4A7FBF;
      --border: #C8C0B4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Silkscreen', cursive;
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.018) 1px, transparent 1px);
      background-size: 8px 8px;
      pointer-events: none;
      z-index: 9998;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.006) 3px, rgba(0,0,0,0.006) 6px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
    }

    /* === SPARKLE PARTICLES === */
    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .spark {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--accent);
    }

    .spark::before, .spark::after {
      content: '';
      position: absolute;
      background: var(--accent);
    }
    .spark::before { width: 2px; height: 2px; top: -4px; left: 0; }
    .spark::after { width: 2px; height: 2px; top: 0; left: -4px; }

    .spark:nth-child(1) { top: 18%; left: 15%; animation: sparkle-float 3s ease-in-out infinite; }
    .spark:nth-child(2) { top: 25%; right: 20%; animation: sparkle-float 2.5s ease-in-out 0.5s infinite; }
    .spark:nth-child(3) { bottom: 30%; left: 22%; animation: sparkle-float 3.5s ease-in-out 1s infinite; }
    .spark:nth-child(4) { top: 40%; right: 12%; animation: sparkle-float 2.8s ease-in-out 0.3s infinite; }
    .spark:nth-child(5) { top: 12%; left: 50%; animation: sparkle-float 3.2s ease-in-out 1.5s infinite; }
    .spark:nth-child(6) { bottom: 22%; right: 30%; animation: sparkle-float 2.6s ease-in-out 0.8s infinite; }

    @keyframes sparkle-float {
      0%, 100% { opacity: 0; transform: scale(1) translateY(0); }
      20% { opacity: 1; }
      50% { opacity: 0.8; transform: scale(1.5) translateY(-10px); }
      80% { opacity: 1; }
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 580px;
    }

    .hero-icon {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;

      filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.1));
      animation: bounce-in 0.5s steps(6) both;
    }

    @keyframes bounce-in {
      0% { opacity: 0; transform: scale(0.3) translateY(40px); }
      60% { transform: scale(1.1) translateY(-8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* === ACQUIRED BOX === */
    .acquired-box {
      border: 4px solid var(--ink);
      background: var(--bg-warm);
      padding: 2rem 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.12);
      animation: pop-in 0.4s steps(6) 0.15s both;
      position: relative;
    }

    .acquired-box::before {
      content: '';
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 2px solid var(--border);
      pointer-events: none;
    }

    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.9) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .acquired-label {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      color: var(--green);
      margin-bottom: 1rem;
      text-transform: uppercase;
    }

    .acquired-title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      line-height: 1.4;
      margin-bottom: 0.75rem;
      text-shadow: 3px 3px 0 rgba(226, 96, 60, 0.2);
    }

    .acquired-subtitle {
      font-family: 'VT323', monospace;
      font-size: 1.25rem;
      color: var(--ink-soft);
      line-height: 1.5;
    }

    /* === DOWNLOAD BUTTON === */
    .download-area {
      animation: pop-in 0.4s steps(6) 0.35s both;
      margin-bottom: 2rem;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      font-family: 'Silkscreen', cursive;
      font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
      border: 4px solid var(--ink);
      background: var(--green);
      color: #fff;
      box-shadow: 6px 6px 0 var(--ink);
      transition: transform 0.05s steps(1), box-shadow 0.05s steps(1);
    }

    .btn-download:hover {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 var(--ink);
    }

    .btn-download:active {
      transform: translate(6px, 6px);
      box-shadow: 0 0 0 var(--ink);
    }

    .btn-download svg { flex-shrink: 0; }

    /* === DETAILS === */
    .details {
      animation: pop-in 0.4s steps(6) 0.5s both;
    }

    .details p {
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: var(--ink-faint);
      line-height: 1.6;
    }

    .details a {
      color: var(--accent);
      text-decoration: none;
    }
    .details a:hover { text-decoration: underline; }

    .receipt-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'VT323', monospace;
      font-size: 1rem;
      color: var(--ink-faint);
      margin-top: 1.5rem;
      padding: 8px 16px;
      border: 2px dashed var(--border);
    }

    .receipt-line .check { color: var(--green); }

    @media (max-width: 480px) {
      .acquired-box { padding: 1.5rem; }
      .btn-download { padding: 14px 24px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="sparkles">
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
    </div>

    <div class="content">
      <img src="icon.png?v=2" class="hero-icon" alt="flock icon">

      <div class="acquired-box">
        <div class="acquired-label">* item acquired *</div>
        <div class="acquired-title">flock is yours</div>
        <div class="acquired-subtitle">
          free forever. updates forever.<br>
          no subscriptions, no tracking, no nonsense.
        </div>
      </div>

      <div class="download-area">
        <a href="https://github.com/Divagation/flock/releases/latest/download/Flock-0.9.3-mac.pkg" class="btn-download">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12l-4-4h2.5V3h3v5H12L8 12z"/><path d="M14 14H2v-2h12v2z"/></svg>
          Download Flock.pkg
        </a>
      </div>

      <div class="details">
        <p>
          open the .pkg and follow the installer.<br>
          launch from Applications or type <strong>flock</strong> in terminal.
        </p>
        <div class="receipt-line">
          <span class="check">&#10003;</span> macOS 13+ &nbsp; <span class="check">&#10003;</span> Apple notarized &nbsp; <span class="check">&#10003;</span> signed
        </div>
      </div>
    </div>
  </div>

</body>
</html>
